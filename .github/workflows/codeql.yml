name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 7 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Default queries are enough for a static-site repo. The only
          # JS surface is build-blog.js (build-time, no user input) plus
          # inline <script> tags in the HTML pages — XSS-shape findings
          # are exactly what we want surfaced.
          config: |
            paths-ignore:
              - "**/node_modules/**"
              - "dist-docs/**"
              - "vendor/**"

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
